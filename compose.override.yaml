services:
  php:
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      REDIS_URL: redis://redis:6379
      REDIS_SESSION_DSN: tcp://redis:6379
    volumes:
      - ./docker/php/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      - .:/app
      - app-var:/app/var
    extra_hosts:
      - host.docker.internal:host-gateway

  nginx:
    volumes:
      - ./docker/nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs/dev-fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - ./docker/nginx/certs/dev-privkey.pem:/etc/ssl/private/privkey.pem:ro
      - ./public:/app/public

  database:
    environment:
      MYSQL_ROOT_PASSWORD: password

  redis:
    environment:
      REDIS_PASSWORD: password

  messenger:
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_SESSION_DSN: tcp://redis:6379
    volumes:
      - .:/app
      - messenger-var:/app/var

  cron:
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_SESSION_DSN: tcp://redis:6379
    volumes:
      - ./docker/php/cron/crontab:/etc/cron.d/app-cron:ro
      - .:/app
      - cron-var:/app/var

  phpmyadmin:
    image: phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: database
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "8080:80"
    depends_on:
      - database

  ###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
  ###< symfony/mailer ###

volumes:
  app-var:
  messenger-var:
  cron-var:
