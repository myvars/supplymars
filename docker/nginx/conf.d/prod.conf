# Nginx config for running behind a reverse proxy (e.g. Caddy).
# HTTP-only — the proxy handles SSL termination.

# Map X-Forwarded-Proto to HTTPS fastcgi param
map $http_x_forwarded_proto $fcgi_https {
    https on;
    default off;
}

# Rate limiting for auth endpoints
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=register:10m rate=2r/m;

server {
    listen 80;
    server_name _;

    # Trust proxy headers from Docker/host networks
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: 'unsafe-inline' is required for:
    #   script-src — dark-mode FOUC-prevention script in base.html.twig (runs before page paint)
    #              — data: URIs are required for Asset Mapper CSS importmap shims (data:application/javascript,...)
    #   style-src  — Tailwind CSS runtime style injection and Flowbite component styles
    # Removing unsafe-inline would require nonce-based CSP, which Asset Mapper does not yet support.
    # img-src includes S3 bucket for product images.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' data: https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://unicorn-bucket-two.s3.eu-west-2.amazonaws.com; font-src 'self'; connect-src 'self' https://challenges.cloudflare.com; frame-src 'self' https://challenges.cloudflare.com; form-action 'self'; base-uri 'self'" always;

    server_tokens off;
    client_max_body_size 4m;

    root /app/public;
    index index.php;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    location = /login {
        limit_req zone=login burst=5 nodelay;
        try_files $uri /index.php$is_args$args;
    }

    location = /register {
        limit_req zone=register burst=1 nodelay;
        try_files $uri /index.php$is_args$args;
    }

    location ^~ /reset-password {
        limit_req zone=register burst=3 nodelay;
        try_files $uri /index.php$is_args$args;
    }

    location = /verify/resend {
        limit_req zone=register burst=3 nodelay;
        try_files $uri /index.php$is_args$args;
    }

    location ^~ /media/cache/resolve/ {
        try_files $uri /index.php$is_args$args;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location = /index.php {
        internal;
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS $fcgi_https;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        access_log off;
    }

    location ~* ^/(assets|build)/ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' data: https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://unicorn-bucket-two.s3.eu-west-2.amazonaws.com; font-src 'self'; connect-src 'self' https://challenges.cloudflare.com; frame-src 'self' https://challenges.cloudflare.com; form-action 'self'; base-uri 'self'" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* (composer\.(json|lock)|\.env|\.git|\.ht|\.svn) {
        deny all;
    }
}
