when@dev: &dev
    # See full configuration: https://symfony.com/bundles/ZenstruckFoundryBundle/current/index.html#full-default-bundle-configuration
    zenstruck_foundry:
        enable_auto_refresh_with_lazy_objects: true
        persistence:
            # Flush only once per call of `PersistentObjectFactory::create()`
            flush_once: true

    services:
        App\Tests\Shared\Factory\:
            resource: '%kernel.project_dir%/tests/Shared/Factory/'
            autowire: true
            autoconfigure: true

        App\Tests\Shared\Story\:
            resource: '%kernel.project_dir%/tests/Shared/Story/'
            autowire: true
            autoconfigure: true

        App\Tests\Shared\DataFixtures\:
            resource: '%kernel.project_dir%/tests/Shared/DataFixtures/'
            autowire: true
            autoconfigure: true

when@test: *dev
