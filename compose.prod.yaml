services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: php-prod
    environment:
      APP_SECRET: ${APP_SECRET}
      SITE_DOMAIN: ${SITE_DOMAIN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_SESSION_DSN: ${REDIS_SESSION_DSN}
      MAILER_DSN: ${MAILER_DSN}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_ACCESS_ID: ${AWS_S3_ACCESS_ID}
      AWS_S3_SECRET_ACCESS_KEY: ${AWS_S3_SECRET_ACCESS_KEY}

  nginx:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: nginx-prod
    volumes:
      - /etc/letsencrypt/live/supplymars.com/fullchain.pem:/etc/ssl/certs/fullchain.pem:ro
      - /etc/letsencrypt/live/supplymars.com/privkey.pem:/etc/ssl/private/privkey.pem:ro

  database:
    environment:
      MYSQL_USER: app
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

  redis:
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  messenger:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: messenger-prod
    environment:
      APP_SECRET: ${APP_SECRET}
      SITE_DOMAIN: ${SITE_DOMAIN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_SESSION_DSN: ${REDIS_SESSION_DSN}
      MAILER_DSN: ${MAILER_DSN}

  cron:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: cron-prod
    environment:
      APP_SECRET: ${APP_SECRET}
      SITE_DOMAIN: ${SITE_DOMAIN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_SESSION_DSN: ${REDIS_SESSION_DSN}
      MAILER_DSN: ${MAILER_DSN}
