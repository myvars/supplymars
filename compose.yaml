services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: php-${DOCKER_BUILD_TARGET:-dev}
    command: sh -c "wait-for-it database:3306 --timeout=60 --strict -- php-fpm"
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "php", "bin/console", "about" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: nginx-${DOCKER_BUILD_TARGET:-dev}
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-kf", "https://localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ###> doctrine/doctrine-bundle ###
  database:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: app
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
  ###< doctrine/doctrine-bundle ###

  messenger:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: php-${DOCKER_BUILD_TARGET:-dev}
    command: sh -c "wait-for-it database:3306 --timeout=60 --strict -- php bin/console messenger:consume async --time-limit=3600"
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "bin/console", "about"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  ###> doctrine/doctrine-bundle ###
  db-data:
###< doctrine/doctrine-bundle ###