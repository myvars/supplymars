# ===============================
# Docker Compose
# ===============================
# Defines core services for Symfony dev stack.
# See compose.prod.yaml & .prod.local.yaml for production overrides.

services:
  # --- MySQL Database ---
  database:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: app
      # Default username/pw set in .env
    volumes:
      - db-data:/var/lib/mysql  # Persist DB data between restarts
    healthcheck:
      # Wait for MySQL to be ready
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped


  # --- Redis Cache ---
  redis:
    image: redis:8.4-alpine
    volumes:
      - redis_data:/data  # Persist redis data between restarts
    healthcheck:
      # Wait for Redis to be ready
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped


  # --- RabbitMQ Message Broker ---
  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped


  # --- PHP Application (FPM) ---
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: php-dev
    depends_on:
      database:
        condition: service_healthy  # Only start when DB is healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # Waits for database before starting PHP-FPM
    command: sh -c "wait-for-it database:3306 --timeout=60 --strict -- php-fpm"
    healthcheck:
      test: [ "CMD", "php-fpm", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped


  # --- Symfony Messenger/Worker ---
  messenger:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: messenger-dev
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # Wait for database, then run messenger consumer
    command: sh -c "wait-for-it database:3306 --timeout=60 --strict -- php bin/console messenger:consume async --time-limit=3600 --sleep=5"
    healthcheck:
      # Checks the messenger is running
      test: ["CMD-SHELL", "ps aux | grep -q '[m]essenger:consume'"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped


  # --- Cron Jobs ---
  cron:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: cron-dev
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # Export all env vars for cron, then start cron in foreground
    command: /bin/sh -c 'printenv | grep -v "no_proxy" > /etc/environment && cron -f'
    healthcheck:
      # Checks cron is running
      test: ["CMD-SHELL", "ps aux | grep -q '[c]ron -f'"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped


  # --- Nginx Webserver ---
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: nginx-dev
    depends_on:
      php:
        condition: service_started
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS (dev SSL cert)
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
    healthcheck:
      # Use curl to verify HTTPS server responds
      test: [ "CMD", "curl", "-kf", "https://localhost" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped


# --- Volumes ---
volumes:
  db-data:  # MySQL data
  redis_data: # Redis data
