# ===============================
# Docker Compose
# ===============================
# Defines core services for Symfony dev stack.
# See compose.prod.yaml & .prod.local.yaml for production overrides.

services:
  # --- MySQL Database ---
  database:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: app
      # Default username/pw set in .env
    volumes:
      - db-data:/var/lib/mysql  # Persist DB data between restarts
    healthcheck:
      # Wait for MySQL to be ready
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s


  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data  # Persist redis data between restarts
    healthcheck:
      # Wait for Redis to be ready
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s


  # --- RabbitMQ Message Broker ---
  rabbitmq:
    image: rabbitmq:4.1.1-management
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s


  # --- PHP Application (FPM) ---
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: php-dev
    # Waits for database before starting PHP-FPM
    command: sh -c "wait-for-it database:3306 --timeout=60 --strict -- php-fpm"
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy  # Only start when DB is healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # Checks the app is responding by running a Symfony command
      test: [ "CMD", "php", "bin/console", "about" ]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s


  # --- Symfony Messenger/Worker ---
  messenger:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: messenger-dev
    # Wait for database, then run messenger consumer
    command: sh -c "wait-for-it database:3306 --timeout=60 --strict -- php bin/console messenger:consume async --time-limit=3600 --sleep=5"
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # Checks the app is responding by running a Symfony command
      test: ["CMD", "php", "bin/console", "about"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s


  # --- Cron Jobs ---
  cron:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: cron-dev
    # Export all env vars for cron, then start cron in foreground
    command: /bin/sh -c 'printenv | grep -v "no_proxy" > /etc/environment && cron -f'
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      # Checks the app is responding by running a Symfony command
      test: [ "CMD", "php", "bin/console", "about" ]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s


  # --- Nginx Webserver ---
  nginx:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: nginx-dev
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS (dev SSL cert)
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      # Use curl to verify HTTPS server responds
      test: [ "CMD", "curl", "-kf", "https://localhost" ]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s


# --- Volumes ---
volumes:
  db-data:  # MySQL data
  redis_data: # Redis data
