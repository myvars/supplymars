name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Optional: build & test locally on GitHub Actions (doesn't affect server)
      - name: Set up Docker Compose
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build containers to check build succeeds
        run: |
          docker compose -f compose.yaml -f compose.override.yaml build --build-arg BUILDKIT_INLINE_CACHE=1 --progress=plain
        env:
          DOCKER_BUILDKIT: 1

      # Run tests
      - name: Run tests
        run: |
          docker compose -f compose.yaml -f compose.override.yaml run --rm -e APP_ENV=test php ./scripts/run-tests.sh
        env:
          APP_ENV: test

      # Deploy to your Lightsail server via SSH
      - name: Deploy to AWS Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/supplymars
            git fetch origin
            git reset --hard origin/main
            git clean -fdx
            export APP_ENV="prod"
            export APP_SECRET="${{ secrets.APP_SECRET }}"
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export MAILER_DSN="${{ secrets.MAILER_DSN }}"
            export SITE_DOMAIN="supplymars"
            export SITE_URL="https://www.supplymars.com"
            export AWS_S3_REGION="eu-west-2"
            export AWS_S3_BUCKET="unicorn-bucket-two"
            export AWS_S3_ACCESS_ID="${{ secrets.AWS_S3_ACCESS_ID }}"
            export AWS_S3_SECRET_ACCESS_KEY="${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}"
            export MYSQL_PASSWORD="${{ secrets.MYSQL_PASSWORD }}"
            export MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}"
            export REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
            export REDIS_URL="${{ secrets.REDIS_URL }}"
            export REDIS_SESSION_DSN="${{ secrets.REDIS_SESSION_DSN }}"
            export RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}"
            export MESSENGER_TRANSPORT_DSN="${{ secrets.MESSENGER_TRANSPORT_DSN }}"
            docker compose -f compose.yaml -f compose.prod.yaml up -d --build --remove-orphans --wait
