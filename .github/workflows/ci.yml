name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        concurrency:
            group: ci-test-${{ github.ref }}
            cancel-in-progress: true

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build containers
              run: |
                  docker compose -f compose.yaml -f compose.override.yaml build --progress=plain

            - name: Check code style
              run: |
                  docker compose -f compose.yaml -f compose.override.yaml run --rm php vendor/bin/php-cs-fixer fix --dry-run --diff

            - name: Run static analysis
              run: |
                  docker compose -f compose.yaml -f compose.override.yaml run --rm php vendor/bin/phpstan analyse --no-progress --memory-limit=512M

            - name: Validate Doctrine schema
              run: |
                  docker compose -f compose.yaml -f compose.override.yaml run --rm -e APP_ENV=test php bin/console doctrine:schema:validate --skip-sync

            - name: Run tests
              run: |
                  docker compose -f compose.yaml -f compose.override.yaml run --rm -e APP_ENV=test php ./scripts/run-tests.sh

    deploy:
        needs: test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        concurrency:
            group: ci-deploy
            cancel-in-progress: false

        steps:
            - name: Deploy to AWS Lightsail
              uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  script: |
                      cd /home/ubuntu/supplymars
                      git fetch origin
                      git reset --hard origin/main
                      git clean -fd
                      export APP_ENV="prod"
                      export APP_SECRET="${{ secrets.APP_SECRET }}"
                      export DATABASE_URL="${{ secrets.DATABASE_URL }}"
                      export MAILER_DSN="${{ secrets.MAILER_DSN }}"
                      export DEFAULT_DOMAIN="supplymars"
                      export DEFAULT_URI="https://www.supplymars.com"
                      export AWS_S3_REGION="eu-west-2"
                      export AWS_S3_BUCKET="unicorn-bucket-two"
                      export AWS_S3_ACCESS_ID="${{ secrets.AWS_S3_ACCESS_ID }}"
                      export AWS_S3_SECRET_ACCESS_KEY="${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}"
                      export MYSQL_PASSWORD="${{ secrets.MYSQL_PASSWORD }}"
                      export MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}"
                      export REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
                      export REDIS_URL="${{ secrets.REDIS_URL }}"
                      export REDIS_SESSION_DSN="${{ secrets.REDIS_SESSION_DSN }}"
                      export RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}"
                      export MESSENGER_TRANSPORT_DSN="${{ secrets.MESSENGER_TRANSPORT_DSN }}"
                      docker compose -f compose.yaml -f compose.prod.yaml up -d --build --remove-orphans --wait
