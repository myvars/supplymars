name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        concurrency:
            group: ci-test-${{ github.ref }}
            cancel-in-progress: true

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Build containers
              run: |
                  docker compose -f compose.yaml -f compose.override.yaml build --progress=plain

            - name: Check code style
              run: |
                  docker compose -f compose.yaml -f compose.override.yaml run --rm -e APP_ENV=test php vendor/bin/php-cs-fixer fix --dry-run --diff

            - name: Run static analysis
              run: |
                  docker compose -f compose.yaml -f compose.override.yaml run --rm -e RUN_MIGRATIONS=false php vendor/bin/phpstan analyse --no-progress --memory-limit=512M

            - name: Validate Doctrine schema
              run: |
                  docker compose -f compose.yaml -f compose.override.yaml run --rm -e APP_ENV=test php bin/console doctrine:schema:validate --skip-sync

            - name: Run tests
              run: |
                  docker compose -f compose.yaml -f compose.override.yaml run --rm -e APP_ENV=test php ./scripts/run-tests.sh

    deploy:
        needs: test
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        concurrency:
            group: ci-deploy
            cancel-in-progress: false

        steps:
            - name: Deploy to AWS Lightsail
              uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SERVER_SSH_KEY }}
                  command_timeout: 20m
                  script: |
                      cd /home/ubuntu/supplymars
                      git fetch origin
                      git reset --hard origin/main
                      git clean -fd

                      mkdir -p /home/ubuntu/supplymars-backups

                      echo "Starting live stack..."
                      docker compose --env-file ../supplymars-secrets/live.env -p supplymars-live -f compose.yaml -f compose.prod.yaml up -d --build --remove-orphans --wait

                      echo "Starting playground stack..."
                      docker compose --env-file ../supplymars-secrets/playground.env -p supplymars-playground --profile playground -f compose.yaml -f compose.prod.yaml up -d --build --remove-orphans --wait

                      echo "Running post-deploy smoke tests..."
                      curl -sf -o /dev/null --retry 3 --retry-delay 5 http://localhost:8001
                      curl -sf -o /dev/null --retry 3 --retry-delay 5 http://localhost:8002
                      docker compose --env-file ../supplymars-secrets/live.env -p supplymars-live -f compose.yaml -f compose.prod.yaml exec -T php php bin/console doctrine:migrations:up-to-date
                      docker compose --env-file ../supplymars-secrets/playground.env -p supplymars-playground -f compose.yaml -f compose.prod.yaml exec -T php php bin/console doctrine:migrations:up-to-date
                      echo "Smoke tests passed."
