name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Optional: build & test locally on GitHub Actions (doesn't affect server)
      - name: Set up Docker Compose
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-        

      - name: Build containers to check build succeeds
        run: |
          docker compose -f compose.yaml -f compose.override.yaml build --build-arg BUILDKIT_INLINE_CACHE=1 --progress=plain
        env:
          DOCKER_BUILDKIT: 1

      # Run tests
      - name: Run tests
        run: |
          docker compose -f compose.yaml -f compose.override.yaml run --rm -e DATABASE_URL=$DATABASE_URL php ./run-tests.sh
        env:
          APP_ENV: test
          DATABASE_URL: mysql://root:password@database:3306/app_test?serverVersion=8.0&charset=utf8mb4

      # Test if the server is reachable via SSH
      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: hostname

      # Deploy to your Lightsail server via SSH
      - name: Deploy to AWS Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/supplymars
            git pull origin main
            export SYMFONY_DECRYPTION_SECRET="${{ secrets.SYMFONY_DECRYPTION_SECRET }}"
            export MYSQL_PASSWORD="${{ secrets.MYSQL_PASSWORD }}"
            export MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}"
            export APP_ENV=prod
            docker compose -f compose.yaml -f compose.prod.yaml up -d --build --remove-orphans --wait